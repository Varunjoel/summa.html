<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Question For You 💌</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --pink: #ff6b9d;
            --deep: #c9184a;
            --blush: #ffd6e7;
            --cream: #fff5f8;
            --dark: #2d1b2e;
            --gold: #f4c430;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Lato', sans-serif;
            background: var(--cream);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Floating hearts background */
        .hearts-bg {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .heart-float {
            position: absolute;
            font-size: 1.5rem;
            opacity: 0.15;
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(110vh) rotate(0deg);
                opacity: 0;
            }

            10% {
                opacity: 0.15;
            }

            90% {
                opacity: 0.15;
            }

            100% {
                transform: translateY(-10vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* ─── QUESTION CARD ─── */
        #card {
            background: white;
            border-radius: 32px;
            padding: 60px 64px;
            max-width: 540px;
            width: 90%;
            text-align: center;
            box-shadow: 0 24px 80px rgba(201, 24, 74, 0.18), 0 4px 16px rgba(0, 0, 0, 0.06);
            position: relative;
            z-index: 10;
            animation: popIn .6s cubic-bezier(.22, 1.2, .5, 1) both;
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(.85) translateY(30px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .emoji-big {
            font-size: 4.5rem;
            display: block;
            margin-bottom: 18px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.12);
            }
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: var(--dark);
            line-height: 1.3;
            margin-bottom: 10px;
        }

        .sub {
            font-size: .95rem;
            color: #a07080;
            margin-bottom: 44px;
            font-style: italic;
        }

        /* Question switcher */
        #question-text {
            font-family: 'Playfair Display', serif;
            font-size: 1.45rem;
            color: var(--deep);
            margin-bottom: 36px;
            min-height: 56px;
            transition: opacity .3s;
        }

        /* Progress dots */
        .dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 36px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--blush);
            transition: background .3s, transform .3s;
        }

        .dot.active {
            background: var(--pink);
            transform: scale(1.4);
        }

        /* Buttons */
        .btn-row {
            display: flex;
            justify-content: center;
            gap: 28px;
            align-items: center;
        }

        .btn {
            padding: 16px 44px;
            border: none;
            border-radius: 50px;
            font-family: 'Lato', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform .15s, box-shadow .15s;
            letter-spacing: .04em;
            user-select: none;
        }

        #yes-btn {
            background: linear-gradient(135deg, var(--pink), var(--deep));
            color: white;
            box-shadow: 0 8px 28px rgba(201, 24, 74, 0.35);
        }

        #yes-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 12px 36px rgba(201, 24, 74, 0.45);
        }

        #no-btn {
            background: white;
            color: #c07090;
            border: 2px solid var(--blush);
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.06);
            position: fixed;
            /* will be repositioned by JS */
            z-index: 999;
            transition: background .2s;
            white-space: nowrap;
        }

        #no-btn.wiggle {
            animation: wiggle .3s ease;
        }

        @keyframes wiggle {

            0%,
            100% {
                transform: rotate(0deg);
            }

            25% {
                transform: rotate(-6deg) scale(1.05);
            }

            75% {
                transform: rotate(6deg) scale(1.05);
            }
        }

        /* ─── CELEBRATION / VIDEO SCREEN ─── */
        #celebration {
            display: none;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 24px;
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 680px;
        }

        #celebration.show {
            display: flex;
        }

        .confetti-msg {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            color: var(--deep);
            animation: popIn .5s cubic-bezier(.22, 1.2, .5, 1) both;
            line-height: 1.2;
        }

        .confetti-sub {
            font-size: 1.05rem;
            color: #a07080;
            font-style: italic;
            animation: popIn .5s .15s cubic-bezier(.22, 1.2, .5, 1) both;
        }

        /* Video box */
        #video-box {
            background: white;
            border-radius: 24px;
            padding: 28px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(201, 24, 74, 0.15);
            animation: popIn .5s .3s cubic-bezier(.22, 1.2, .5, 1) both;
        }

        #video-box video {
            width: 100%;
            border-radius: 14px;
            max-height: 380px;
            background: #1a0a10;
        }

        .vid-label {
            font-size: .82rem;
            color: #b09090;
            margin-top: 10px;
            font-family: 'Lato', sans-serif;
            word-break: break-all;
        }

        /* Upload hint */
        #upload-hint {
            background: var(--blush);
            border-radius: 16px;
            padding: 28px 32px;
            width: 100%;
            box-shadow: 0 8px 24px rgba(201, 24, 74, 0.1);
            animation: popIn .5s .3s cubic-bezier(.22, 1.2, .5, 1) both;
        }

        #upload-hint p {
            font-size: 1rem;
            color: var(--deep);
            margin-bottom: 16px;
            font-family: 'Playfair Display', serif;
            font-style: italic;
        }

        #upload-hint input[type="file"] {
            display: block;
            width: 100%;
            padding: 12px;
            border: 2px dashed var(--pink);
            border-radius: 12px;
            background: white;
            cursor: pointer;
            font-size: .9rem;
            color: #a07080;
        }

        #upload-hint input[type="file"]:hover {
            border-color: var(--deep);
        }

        /* Confetti particles */
        .confetti-p {
            position: fixed;
            width: 10px;
            height: 10px;
            border-radius: 2px;
            pointer-events: none;
            z-index: 999;
            animation: confettiFall 2.5s ease-in forwards;
        }

        @keyframes confettiFall {
            0% {
                opacity: 1;
                transform: translateY(0) rotate(0deg);
            }

            100% {
                opacity: 0;
                transform: translateY(100vh) rotate(720deg);
            }
        }
    </style>
</head>

<body>

    <!-- Floating hearts background -->
    <div class="hearts-bg" id="hearts-bg"></div>

    <!-- ─── QUESTION CARD ─── -->
    <div id="card">
        <span class="emoji-big">💌</span>
        <h1>I have something to ask you…</h1>
        <p class="sub">Please read carefully 🥺</p>

        <div id="question-text">Will you be my girlfriend?</div>

        <div class="dots" id="dots"></div>

        <div class="btn-row">
            <button class="btn" id="yes-btn" onclick="handleYes()">Yes 💕</button>
            <button class="btn" id="no-btn">No 🙈</button>
        </div>
    </div>

    <!-- ─── CELEBRATION SCREEN ─── -->
    <div id="celebration">
        <div class="confetti-msg">She said YES! 🎉💖</div>
        <p class="confetti-sub">I knew it. You made me the happiest person alive. 🌸</p>

        <!-- If a video src is set, show video; otherwise show file picker -->
        <div id="video-box" style="display:none">
            <video id="the-video" controls autoplay loop playsinline></video>
            <p class="vid-label" id="vid-label"></p>
        </div>

        <div id="upload-hint">
            <p>🎬 A little something I made for you…</p>
            <input type="file" accept="video/*" id="vid-upload" onchange="loadVideo(this)">
            <p style="font-size:.8rem;color:#c090a0;margin-top:10px;font-family:Lato,sans-serif;">
                Upload a video file to play it here ✨
            </p>
        </div>
    </div>

    <!-- No btn lives outside card so it can teleport anywhere -->
    <script>
        /* ═══════════════════════════════
           QUESTIONS
        ══════════════════════════════════ */
        const questions = [
            "Will you be my girlfriend? 🥺",
            "Do you feel the same way I feel about you? 💓",
            "Can I be the reason you smile every day? 😊",
            "Will you hold my hand and never let go? 🤝",
            "Would you give us a chance to be something beautiful? 🌹",
            "Will you be my girlfriend… for real this time? 💍"
        ];

        let currentQ = 0;
        const qEl = document.getElementById('question-text');
        const dots = document.getElementById('dots');

        // Build dots
        questions.forEach((_, i) => {
            const d = document.createElement('span');
            d.className = 'dot' + (i === 0 ? ' active' : '');
            dots.appendChild(d);
        });

        function nextQuestion() {
            currentQ = (currentQ + 1) % questions.length;
            qEl.style.opacity = 0;
            setTimeout(() => {
                qEl.textContent = questions[currentQ];
                qEl.style.opacity = 1;
                document.querySelectorAll('.dot').forEach((d, i) => {
                    d.className = 'dot' + (i === currentQ ? ' active' : '');
                });
            }, 300);
        }

        /* ═══════════════════════════════
           FLOATING HEARTS BG
        ══════════════════════════════════ */
        const bg = document.getElementById('hearts-bg');
        const emojis = ['❤️', '💕', '💗', '💓', '🌸', '✨', '💝', '💖'];
        for (let i = 0; i < 22; i++) {
            const h = document.createElement('span');
            h.className = 'heart-float';
            h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
            h.style.left = Math.random() * 100 + 'vw';
            h.style.animationDuration = (8 + Math.random() * 14) + 's';
            h.style.animationDelay = (-Math.random() * 20) + 's';
            h.style.fontSize = (.8 + Math.random() * 1.8) + 'rem';
            bg.appendChild(h);
        }

        /* ═══════════════════════════════
           ANTIGRAVITY NO BUTTON
        ══════════════════════════════════ */
        const noBtn = document.getElementById('no-btn');

        // Place No button in its natural spot initially
        function initNoBtn() {
            const yesBtnR = document.getElementById('yes-btn').getBoundingClientRect();
            noBtn.style.left = (yesBtnR.right + 28) + 'px';
            noBtn.style.top = yesBtnR.top + 'px';
        }
        window.addEventListener('load', initNoBtn);
        window.addEventListener('resize', initNoBtn);

        let noPos = { x: 0, y: 0 };

        document.addEventListener('mousemove', (e) => {
            const r = noBtn.getBoundingClientRect();
            const cx = r.left + r.width / 2;
            const cy = r.top + r.height / 2;
            const dx = e.clientX - cx;
            const dy = e.clientY - cy;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const FLEE_RADIUS = 120;

            if (dist < FLEE_RADIUS) {
                // Change question on every jump
                nextQuestion();

                // Add wiggle animation
                noBtn.classList.remove('wiggle');
                void noBtn.offsetWidth;
                noBtn.classList.add('wiggle');

                // Teleport to a random position (here and there)
                const margin = 50;
                const maxX = window.innerWidth - r.width - margin;
                const maxY = window.innerHeight - r.height - margin;

                // Generate random coords
                let nx = Math.random() * maxX;
                let ny = Math.random() * maxY;

                // Ensure it doesn't jump right under the cursor again
                if (Math.abs(nx - e.clientX) < 100 && Math.abs(ny - e.clientY) < 100) {
                    nx = (nx + 200) % maxX;
                    ny = (ny + 200) % maxY;
                }

                noBtn.style.transition = 'left .3s cubic-bezier(.19, 1, .22, 1), top .3s cubic-bezier(.19, 1, .22, 1)';
                noBtn.style.left = Math.max(margin, nx) + 'px';
                noBtn.style.top = Math.max(margin, ny) + 'px';
            }
        });

        // Touch support for mobile
        document.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            document.dispatchEvent(new MouseEvent('mousemove', {
                clientX: touch.clientX,
                clientY: touch.clientY
            }));
        }, { passive: true });

        /* ═══════════════════════════════
           YES CLICK → CELEBRATION
        ══════════════════════════════════ */
        function handleYes() {
            document.getElementById('card').style.display = 'none';
            noBtn.style.display = 'none';
            const cel = document.getElementById('celebration');
            cel.classList.add('show');
            launchConfetti();
            autoLoadVideo();
        }

        function launchConfetti() {
            const colors = ['#ff6b9d', '#c9184a', '#ffd6e7', '#f4c430', '#ff9ec4', '#fff'];
            for (let i = 0; i < 120; i++) {
                setTimeout(() => {
                    const p = document.createElement('div');
                    p.className = 'confetti-p';
                    p.style.left = Math.random() * 100 + 'vw';
                    p.style.top = '-10px';
                    p.style.background = colors[Math.floor(Math.random() * colors.length)];
                    p.style.width = (6 + Math.random() * 10) + 'px';
                    p.style.height = (6 + Math.random() * 10) + 'px';
                    p.style.animationDuration = (1.5 + Math.random() * 2) + 's';
                    document.body.appendChild(p);
                    setTimeout(() => p.remove(), 4000);
                }, i * 20);
            }
        }

        /* ═══════════════════════════════
           VIDEO LOADER
        ══════════════════════════════════ */
        function loadVideo(input) {
            if (!input.files[0]) return;
            const url = URL.createObjectURL(input.files[0]);
            const vid = document.getElementById('the-video');
            const box = document.getElementById('video-box');
            const hint = document.getElementById('upload-hint');
            const lbl = document.getElementById('vid-label');

            vid.src = url;
            lbl.textContent = '📂 ' + input.files[0].name;
            box.style.display = 'block';
            hint.style.display = 'none';
        }

        /* ═══════════════════════════════
           AUTO VIDEO — plays on Yes click
        ══════════════════════════════════ */
        function autoLoadVideo() {
            const vid = document.getElementById('the-video');
            const box = document.getElementById('video-box');
            const hint = document.getElementById('upload-hint');
            const lbl = document.getElementById('vid-label');

            // ✓ THIS IS THE FIX: We are inside USER GESTURE EVENT (Yes button click)
            // ✔ Browsers ALLOW autoplay here because it was triggered DIRECTLY by user click
            vid.muted = false; // ✓ Play WITH SOUND now! No need to be muted
            vid.autoplay = true;
            vid.playsInline = true;
            vid.controls = true;

            // Set source
            vid.src = 'IMG_3653.MP4';
            lbl.textContent = '🎬 Playing: IMG_3653.MP4';

            box.style.display = 'block';
            hint.style.display = 'none';

            // ✅ EXPLICITLY CALL PLAY() RIGHT AWAY from Yes click context
            vid.load(); // First pre-load
            vid.play().then(() => {
                console.log("✅ Video AUTO PLAYED successfully after Yes click!");
            }).catch(e => {
                console.log("Autoplay blocked:", e);
                // Try again with muted as last resort
                vid.muted = true;
                vid.play();
            });

            // If video file missing show upload hint
            vid.onerror = function () {
                console.log("Video file not found.");
                box.style.display = 'none';
                hint.style.display = 'block';
                const errorMsg = document.createElement('p');
                errorMsg.style.color = '#ff4d4d';
                errorMsg.style.fontSize = '0.85rem';
                errorMsg.style.marginTop = '10px';
                errorMsg.innerHTML = '⚠️ <b>IMG_3653.MP4</b> not found in folder.<br>Please upload it manually below!';
                hint.prepend(errorMsg);
            };
        }
    </script>
</body>

</html>
